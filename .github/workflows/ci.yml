name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -v -e ".[dev]" 2>&1 | tee install.log
      - name: Lint
        continue-on-error: true
        run: ruff check src tests
      - name: Tests
        run: pytest -v --tb=long
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-and-pytest-logs
          path: |
            install.log
            .pytest_cache/
